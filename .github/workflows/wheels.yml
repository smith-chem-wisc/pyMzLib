# Builds and tests a pyMzLib wheel for every supported platform, on machines we do not own.
#
# This is the answer to "do I need a Mac?" — no. GitHub runs the macOS, Linux, and Windows jobs
# below on its own hardware. Building the payload for a platform never needs that platform
# (`dotnet publish -r osx-arm64` cross-compiles fine from Linux); only *testing* it does, and
# that is what the matrix is for.
#
# Note on cost: macOS runner minutes are free and unmetered on public repositories, and billed at
# 10x on private ones — one reason this repository is public.

name: wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  # Keep in step with code/PINNED.md. The bridge and the Python package must be built from the
  # same mzLib source, so this is pinned rather than tracking master.
  MZLIB_COMMIT: 525cb7c8e3875501868fb961d0bc1bd34ef5174e
  DOTNET_VERSION: '8.0.x'

jobs:
  # ---------------------------------------------------------------------------------------
  # Both languages, both coverage gates. This runs first and fastest: a failure here should
  # stop the expensive cross-platform matrix below.
  # ---------------------------------------------------------------------------------------
  tests:
    name: tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out pinned mzLib
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/smith-chem-wisc/mzLib.git code/mzLib
          git -C code/mzLib checkout --detach "$MZLIB_COMMIT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- C# -------------------------------------------------------------------------------
      # ExternalService tests are excluded here and run in their own job below. This job must be
      # able to fail only for reasons that are our fault.
      - name: Bridge tests
        run: >
          dotnet test pkg/bridge.tests/MzLibBridge.Tests.csproj
          -c Release -p:Platform=x64 --nologo
          --filter "TestCategory!=ExternalService"
          --collect:"XPlat Code Coverage"

      # The raw number from the line above covers all of mzLib and reads about 0.6%, which is
      # meaningless rather than bad. This scopes it to code we actually wrote and enforces it.
      - name: Bridge coverage gate
        shell: pwsh
        run: ./pkg/build/check-bridge-coverage.ps1

      # --- Python ---------------------------------------------------------------------------
      - name: Build the bridge for the Python tests
        shell: pwsh
        run: ./pkg/build/publish-bridge.ps1 -Runtime linux-x64

      - name: Python tests, offline
        working-directory: pkg/python
        run: |
          pip install -e ".[dev]"
          pytest -m "not network" --cov=pymzlib --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: pkg/python/coverage.xml,pkg/bridge.tests/TestResults/*/coverage.cobertura.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------------------
  # Live canaries against EBI, in their own job, following mzLib's ExternalService convention.
  #
  # Everything above runs against stubs and recorded fixtures, so it would keep passing even if
  # PRIDE changed its API tomorrow. These are the tests that would notice — and they are the only
  # ones whose result depends on a third party, which is exactly why they are quarantined here
  # rather than mixed into the required run.
  #
  # There is no continue-on-error, deliberately. The bridge classifies availability failures as
  # ServiceUnavailable, and both suites turn that into a *skip* with an explanatory message. So a
  # failure in this job means the contract broke, not that EBI is down — which is the whole point:
  # a red result should never leave anyone wondering whose fault it is.
  # ---------------------------------------------------------------------------------------
  external-services:
    name: live canaries (PRIDE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out pinned mzLib
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/smith-chem-wisc/mzLib.git code/mzLib
          git -C code/mzLib checkout --detach "$MZLIB_COMMIT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bridge canaries
        run: >
          dotnet test pkg/bridge.tests/MzLibBridge.Tests.csproj
          -c Release -p:Platform=x64 --nologo
          --filter "TestCategory=ExternalService"
          --logger "console;verbosity=normal"

      - name: Build the bridge for the Python canaries
        shell: pwsh
        run: ./pkg/build/publish-bridge.ps1 -Runtime linux-x64

      - name: Python canaries
        working-directory: pkg/python
        run: |
          pip install -e ".[dev]"
          pytest -m network -v -rs   # -rs prints the reason for any skip, so an outage is visible

  # ---------------------------------------------------------------------------------------
  # One Linux runner cross-builds every platform's payload and wheel. Cheap, and it keeps the
  # macOS runners for the job only they can do: actually running the thing.
  # ---------------------------------------------------------------------------------------
  build:
    needs: tests
    name: build wheel (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            plat_tag: win_amd64
          # These tags are a COMPATIBILITY PROMISE, not a label. They previously claimed
          # manylinux_2_17 (glibc 2.17 / CentOS 7) and macOS 11, both of which are below what
          # .NET 8 actually requires — glibc 2.23 and macOS 12. A user on RHEL 7 therefore got a
          # successful pip install and a runtime failure, and no CI runner is old enough to
          # notice. The floors below match .NET 8's documented supported set; the manylinux_2_28
          # job in `test` is what actually holds them honest.
          - rid: linux-x64
            plat_tag: manylinux_2_28_x86_64
          - rid: osx-x64
            plat_tag: macosx_12_0_x86_64
          - rid: osx-arm64
            plat_tag: macosx_12_0_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Check out pinned mzLib
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/smith-chem-wisc/mzLib.git code/mzLib
          git -C code/mzLib checkout --detach "$MZLIB_COMMIT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish the self-contained bridge
        shell: pwsh
        run: ./pkg/build/publish-bridge.ps1 -Runtime ${{ matrix.rid }}

      - name: Build the wheel
        working-directory: pkg/python
        run: |
          python -m pip install --upgrade build wheel
          python -m build --wheel --outdir dist_untagged

      # hatchling produces a py3-none-any wheel because there is no compiled Python code in the
      # package. That is wrong here: the wheel carries a platform binary, so it must refuse to
      # install on the wrong OS. Retagging is the standard fix and is why we get ONE wheel per
      # operating system rather than one per OS x Python version (decision D7).
      - name: Retag as a platform wheel
        working-directory: pkg/python
        run: |
          python -m wheel tags \
            --python-tag py3 --abi-tag none \
            --platform-tag ${{ matrix.plat_tag }} \
            --remove \
            dist_untagged/*.whl
          ls -lh dist_untagged

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.rid }}
          path: pkg/python/dist_untagged/*.whl

  # ---------------------------------------------------------------------------------------
  # Install each wheel the way a stranger would, on the real operating system, and run the
  # tests against it. Only the floor and the ceiling Python are tested: with no compiled
  # extension, the versions in between cannot differ in a way these tests would catch.
  # ---------------------------------------------------------------------------------------
  test:
    name: test ${{ matrix.os }} / py${{ matrix.python }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64, python: '3.9' }
          - { os: ubuntu-latest,  rid: linux-x64, python: '3.14' }
          - { os: windows-latest, rid: win-x64,   python: '3.9' }
          - { os: windows-latest, rid: win-x64,   python: '3.14' }
          - { os: macos-14,       rid: osx-arm64, python: '3.14' }   # Apple Silicon
          - { os: macos-15-intel, rid: osx-x64,   python: '3.14' }   # Intel
          #
          # macos-13 was retired on 4 December 2025, and a job naming a retired image queues
          # forever rather than failing — a miserable way to find out. macos-15-intel is the
          # designated replacement and the last Intel image; GitHub retires x86-64 macOS runners
          # in Fall 2027. When that lands, drop this row but KEEP building the osx-x64 wheel:
          # Intel Macs will still be doing real work in labs long after GitHub stops offering
          # them, and an untested wheel beats no wheel.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.rid }}
          path: wheelhouse

      # Deliberately NOT an editable install of the source tree — install the built artifact,
      # so what is tested is what a user would receive.
      - name: Install the wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install wheelhouse/*.whl

      - name: The whole claim, in one line
        shell: bash
        run: python -c "import pymzlib; print(pymzlib.bridge_version())"

      - name: Offline tests
        working-directory: pkg/python
        run: python -m pytest -m "not network" -v

      # A skip here means EBI was unavailable, not that this platform is broken; -rs prints the
      # reason so the distinction is visible in the log.
      - name: Live canaries
        working-directory: pkg/python
        run: python -m pytest -m "network" -v -rs
  # ---------------------------------------------------------------------------------------
  # The claim being made is "you do not need .NET installed." GitHub's runners have .NET on
  # them, so passing there does not prove it. A stock python:slim container does.
  # ---------------------------------------------------------------------------------------
  no-dotnet:
    name: works with no .NET installed
    needs: build
    runs-on: ubuntu-latest
    container: python:3.9-slim
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x64
          path: wheelhouse

      - name: Confirm this machine really has no .NET
        run: |
          if command -v dotnet; then echo "::error::dotnet is present; this test proves nothing"; exit 1; fi
          echo "no dotnet on PATH, as intended"

      # Deliberately NOT a live PRIDE call. This job gates the release, and what it exists to prove
      # is that the bundled runtime works without .NET installed — which bridge_version() shows by
      # executing the payload end to end. Calling PRIDE here would additionally make an EBI outage
      # block a release, and would bypass the outage-classification convention every other live
      # test routes through.
      - name: Install and use pyMzLib
        run: |
          pip install wheelhouse/*.whl
          python -c "import pymzlib; info = pymzlib.bridge_version(); print(info); assert info['protocol'] == 1"

  # ---------------------------------------------------------------------------------------
  # The oldest Linux we claim to support. Every other runner is glibc 2.31+, so nothing else
  # in this workflow can catch a wheel tagged for a glibc older than .NET actually needs — and
  # that user (an old cluster, a Python they cannot change) is precisely who this package is for.
  # ---------------------------------------------------------------------------------------
  glibc-floor:
    name: runs on the oldest glibc we claim
    needs: build
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x64
          path: wheelhouse

      - name: Install and run on manylinux_2_28
        run: |
          ldd --version | head -1
          # The PyPA images keep interpreters under /opt/python/<tag>/bin rather than on PATH.
          PY=$(ls -d /opt/python/cp311-cp311/bin/python3 2>/dev/null || command -v python3.11 || command -v python3)
          echo "using $PY"
          "$PY" -m pip install --quiet wheelhouse/*.whl
          "$PY" -c "import pymzlib; print(pymzlib.bridge_version())"

  # ---------------------------------------------------------------------------------------
  # Publish, on a tag, via Trusted Publishing. No stored API token: PyPI verifies the workflow's
  # OIDC identity instead. Deliberately no sdist — a source-only sdist for a package whose whole
  # value is the bundled binary installs "successfully" and then fails on first call, whereas
  # wheels-only gives an unsupported platform a clean "no matching distribution found".
  # ---------------------------------------------------------------------------------------
  release:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    # external-services is included deliberately. Gating a release on the live canaries is safe
    # precisely because they SKIP on an EBI outage rather than failing, so this cannot block a
    # release when PRIDE is merely down — but it does block one when the API contract has actually
    # broken, which is the only state in which shipping would be wrong.
    needs: [tests, external-services, build, test, no-dotnet, glibc-floor]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pymzlib
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check the artifacts before anything is published
        run: |
          pip install --quiet twine
          ls -lh dist
          twine check --strict dist/*.whl

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: false
